<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bushido | Registro</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <link rel="stylesheet" href="/themes/bushido/default.css">
    <script src="/themes/bushido/scripts/common.js" defer></script>
</head>
<body>

    <div id="safety-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999;"></div>
    <div class="waves-bg"></div>

    <div class="w-full max-w-md text-left mb-6 px-2 flex items-center gap-4 z-10 relative" style="margin: 20px auto 0; justify-content: center;">
        <div class="brand-icon" style="width:50px; height:50px; clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%); background: linear-gradient(135deg, var(--bushido-red), var(--bushido-gold)); display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.5rem;">⚔️</div>
        <div>
            <h1 class="text-3xl font-bold tracking-tight flex items-center gap-2" style="font-family: 'Noto Serif JP', serif;">Kazuma <span style="color: var(--bushido-red);">Bushido</span></h1>
            <p class="text-[11px] font-semibold text-slate-500 uppercase tracking-wider mt-0.5">Forja tu camino</p>
        </div>
    </div>

    <div class="login-card" style="max-width: 500px; margin: 0 auto;">
        <div class="mb-6">
            <h2 class="text-2xl font-bold" style="font-family: 'Noto Serif JP', serif;">⚔️ Registro</h2>
            <p class="text-xs text-slate-400 mt-1">Crea tu cuenta de guerrero</p>
        </div>

        <form id="registerForm" class="space-y-5">
            <div>
                <label class="block text-xs font-medium text-slate-400 mb-2">Nombre de usuario</label>
                <input type="text" id="username" class="input-kazuma" placeholder="tu_nombre" required>
            </div>

            <div>
                <label class="block text-xs font-medium text-slate-400 mb-2">Correo electrónico</label>
                <input type="email" id="email" class="input-kazuma" placeholder="tu@ejemplo.com" required>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="relative">
                    <label class="block text-xs font-medium text-slate-400 mb-2">Contraseña</label>
                    <input type="password" id="password" class="input-kazuma" placeholder="••••" required>
                    <i class="fas fa-eye absolute right-4 top-[46px] cursor-pointer text-slate-500" onclick="togglePassword('password', this)"></i>
                </div>
                <div class="relative">
                    <label class="block text-xs font-medium text-slate-400 mb-2">Confirmar</label>
                    <input type="password" id="confirmPassword" class="input-kazuma" placeholder="••••" required>
                    <i class="fas fa-eye absolute right-4 top-[46px] cursor-pointer text-slate-500" onclick="togglePassword('confirmPassword', this)"></i>
                </div>
            </div>

            <div class="flex items-center px-1">
                <label class="flex items-center gap-2 text-xs font-medium text-slate-400 cursor-pointer">
                    <input type="checkbox" id="tos" class="accent-red-700 w-4 h-4 rounded border-none bg-slate-800" required>
                    Acepto los <a href="/tos/terms" class="hover:underline">términos y condiciones</a>
                </label>
            </div>

            <div class="g-recaptcha" data-sitekey="6Lcz9dwsAAAAAMJ3mdr0wYqws6j7eys_hNdMDKcj" data-theme="dark"></div>

            <button type="submit" id="btnSubmit" class="btn-purple">
                <i class="fas fa-feather-alt mr-2"></i> Forjar cuenta
            </button>
        </form>

        <div class="relative flex py-5 items-center">
            <div class="flex-grow border-t border-white/[0.03]"></div>
            <span class="flex-shrink mx-4 text-slate-500 text-[9px] font-bold tracking-widest uppercase">O regístrate con</span>
            <div class="flex-grow border-t border-white/[0.03]"></div>
        </div>

        <div class="w-full mb-6">
            <a href="https://rest.kazuma.giize.com/api/auth/github" class="btn-github-oauth" style="background:#1e1e2a; border:1px solid var(--bushido-red); color:var(--bushido-text); display:flex; align-items:center; justify-content:center; gap:10px; padding:10px; clip-path: polygon(0% 0%, 100% 0%, 98% 100%, 0% 100%);">
                <i class="fab fa-github text-lg"></i> GitHub
            </a>
        </div>

        <div class="flex flex-col gap-3 justify-center items-center text-xs font-medium border-t border-white/[0.03] pt-5">
            <p class="text-slate-400">⚔️ ¿Ya tienes cuenta? <a href="/login" class="hover:underline">Inicia Sesión</a></p>
            <a href="mailto:pixelcrewteam@gmail.com" class="w-full py-2 rounded-2xl text-[10px] font-bold flex items-center justify-center gap-2 transition bg-white/5 text-slate-400 hover:text-white border border-white/5 uppercase tracking-widest">
                <i class="fas fa-question-circle"></i> Necesitas Ayuda
            </a>
        </div>
    </div>

    <div class="mt-8 text-center z-10 relative" style="margin-bottom: 20px;">
        <a href="/terms" class="text-xs font-semibold text-slate-600 hover:text-slate-400 transition underline decoration-dotted">Condiciones del servicio</a>
    </div>

    <script>
        (async function initialCheck() {
            const user = localStorage.getItem('kazuma_user');
            if (user) {
                window.location.href = '/dash';
            } else {
                document.getElementById('safety-overlay').style.display = 'none';
            }
        })();

        function togglePassword(id, el) {
            const input = document.getElementById(id);
            if (input.type === "password") {
                input.type = "text";
                el.classList.remove("fa-eye");
                el.classList.add("fa-eye-slash");
            } else {
                input.type = "password";
                el.classList.remove("fa-eye-slash");
                el.classList.add("fa-eye");
            }
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const captchaResponse = grecaptcha.getResponse();
            if (!captchaResponse) {
                return Swal.fire({ title: 'Seguridad', text: 'Resuelve el CAPTCHA', icon: 'warning', background: 'var(--bushido-card)', color: 'var(--bushido-text)' });
            }
            const pass = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            if (pass !== confirm) {
                return Swal.fire({ title: 'Error', text: 'Las contraseñas no coinciden', icon: 'error', background: 'var(--bushido-card)', color: 'var(--bushido-text)' });
            }
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Forjando...';
            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        email: document.getElementById('email').value,
                        password: pass,
                        captcha: captchaResponse
                    })
                });
                const data = await res.json();
                if (data.status) {
                    Swal.fire({
                        title: 'Registro exitoso',
                        html: `<p>Tu cuenta ha sido creada.</p><br><p style="color:var(--bushido-gold); font-weight:bold; font-size:13px; font-family:monospace;">API KEY: ${data.key}</p>`,
                        icon: 'success',
                        background: 'var(--bushido-card)',
                        color: 'var(--bushido-text)',
                        confirmButtonText: 'Ir al dashboard',
                        confirmButtonColor: '#9b2c2c'
                    }).then(() => {
                        document.getElementById('safety-overlay').style.display = 'block';
                        window.location.href = '/dash';
                    });
                } else {
                    throw new Error(data.message || "Error en el registro");
                }
            } catch (err) {
                Swal.fire({ title: 'Error', text: err.message, icon: 'error', background: 'var(--bushido-card)', color: 'var(--bushido-text)' });
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-feather-alt mr-2"></i> Forjar cuenta';
                grecaptcha.reset();
            }
        });
    </script>
</body>
</html>
